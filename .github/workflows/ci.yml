name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p coldrun-cli

      - name: Smoke all queries (demo 10k rows)
        run: ./scripts/smoke-all.sh 10000

  validate-parquet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ClickHouse (latest master)
        run: ./scripts/install-clickhouse-local.sh

      - name: Cache 1M parquet slice
        uses: actions/cache@v4
        id: parquet-cache
        with:
          path: data/hits-1m.parquet
          key: hits-1m-parquet-v1

      - name: Sample 1M row parquet slice
        if: steps.parquet-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          ./scripts/sample-parquet.sh https://datasets.clickhouse.com/hits_compatible/hits.parquet 1000000 data/hits-1m.parquet

      - name: Build
        run: cargo build --release -p coldrun-cli

      - name: Validate coldrun vs ClickHouse (1M parquet)
        run: ./scripts/validate-parquet.sh data/hits-1m.parquet
